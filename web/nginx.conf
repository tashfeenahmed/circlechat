server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # The SPA entry must never be cached: asset filenames are content-hashed
    # and change every deploy, so a heuristically-cached index.html points at
    # purged bundles → blank page until a hard refresh. no-cache still allows
    # etag revalidation (cheap 304s), it just forbids serving stale copies.
    location / {
        try_files $uri /index.html;
        add_header Cache-Control "no-cache";
    }

    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }
}
